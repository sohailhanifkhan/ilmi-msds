<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSDS Library</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
}

.header {
    background: linear-gradient(135deg, #1a3a6b, #2a5298);
    color: white;
    text-align: center;
    padding: 28px 20px;
}
.header h2 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.header p  { font-size: 13px; opacity: .8; }

.legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    background: white;
    padding: 14px 16px;
    border-bottom: 1px solid #e0e0e0;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #444;
    font-weight: 500;
}
.legend-item svg { width: 32px; height: 32px; flex-shrink: 0; }

.search {
    text-align: center;
    padding: 14px 16px;
    background: white;
    border-bottom: 1px solid #e0e0e0;
}
.search input {
    width: 100%;
    max-width: 480px;
    padding: 9px 14px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #f7f9fb;
    outline: none;
    transition: border-color .2s;
}
.search input:focus { border-color: #2a5298; }

.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px;
    padding: 16px;
}

.card {
    background: white;
    border-radius: 12px;
    border: 1px solid #e0e6f0;
    overflow: hidden;
    transition: box-shadow .2s, border-color .2s;
}
.card:hover {
    box-shadow: 0 4px 16px rgba(42,82,152,.12);
    border-color: #b0c4e8;
}
.card-accent { height: 5px; }
.card-body   { padding: 14px; }
.card-name {
    font-size: 14px;
    font-weight: 600;
    color: #1a2a4a;
    margin-bottom: 10px;
    line-height: 1.4;
}
.card-icons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    min-height: 42px;
}
.card-icons svg { width: 40px; height: 40px; }
.card-btn {
    width: 100%;
    padding: 9px;
    border: 1px solid #c8d6ea;
    border-radius: 7px;
    background: transparent;
    color: #2a5298;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background .15s;
    font-family: Arial, sans-serif;
}
.card-btn:hover { background: #eef2f7; }
</style>
</head>
<body>

<div class="header">
    <h2>MSDS Library</h2>
    <p>Click to Access Safety Data Sheets</p>
</div>

<div class="legend" id="legend"></div>

<div class="search">
    <input type="text" id="search" placeholder="Search chemicals..." onkeyup="filterData()">
</div>

<div class="container" id="list"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSSksGapM9TAjh1gbpm6JxtidPcA9XD2gwT40anhDJCfSys4xqlNKTAZIBnuxVBzgpNZWyvMvhAWjrA/pub?output=csv";

let dataList = [];

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// ─── GHS PICTOGRAM DEFINITIONS ───────────────────────────────────────────────
// Each entry: { label, accentColor, svgInner }
// svgInner is the black symbol drawn on a white-filled diamond (viewBox 0 0 100 100)
// Outer red-bordered diamond and white inner fill are always the same — generated by buildGHS()

const GHS = {

    flammable: {
        label: "Flammable",
        accent: "#c0392b",
        symbol: `
            <path d="M50,68 C38,68 30,60 30,50 C30,42 34,36 40,30
                     C39,38 44,42 46,38 C46,32 50,26 50,26
                     C50,26 52,34 56,36 C60,38 62,44 62,50
                     C62,56 58,62 58,58 C58,54 56,50 52,52
                     C52,60 62,62 62,68 Z" fill="black"/>
            <line x1="32" y1="72" x2="68" y2="72"
                  stroke="black" stroke-width="2.5" stroke-linecap="round"/>`
    },

    explosive: {
        label: "Explosive",
        accent: "#c0392b",
        symbol: `
            <g stroke="black" stroke-width="2" stroke-linecap="round" fill="none">
                <line x1="50" y1="22" x2="50" y2="15"/>
                <line x1="62" y1="26" x2="68" y2="20"/>
                <line x1="38" y1="26" x2="32" y2="20"/>
                <line x1="70" y1="36" x2="77" y2="31"/>
                <line x1="30" y1="36" x2="23" y2="31"/>
                <line x1="72" y1="50" x2="80" y2="50"/>
                <line x1="28" y1="50" x2="20" y2="50"/>
            </g>
            <circle cx="50" cy="44" r="10" fill="black"/>
            <polygon points="50,31 54,41 46,41" fill="black"/>
            <polygon points="63,38 57,46 66,49" fill="black"/>
            <polygon points="37,38 43,46 34,49" fill="black"/>
            <polygon points="60,56 54,48 63,46" fill="black"/>
            <polygon points="40,56 46,48 37,46" fill="black"/>
            <polygon points="50,57 54,48 46,48" fill="black"/>
            <line x1="32" y1="70" x2="68" y2="70"
                  stroke="black" stroke-width="2.5" stroke-linecap="round"/>`
    },

    oxidizer: {
        label: "Oxidizer",
        accent: "#d35400",
        symbol: `
            <circle cx="50" cy="65" r="13" fill="none" stroke="black" stroke-width="3"/>
            <path d="M50,49 C44,49 38,43 38,36
                     C38,30 41,25 46,21
                     C44,27 47,30 49,27
                     C49,22 52,18 52,18
                     C52,18 53,25 56,27
                     C59,29 61,33 61,36
                     C61,41 57,45 57,42
                     C57,39 55,36 52,38
                     C52,43 60,45 60,49 Z" fill="black"/>
            <line x1="32" y1="80" x2="68" y2="80"
                  stroke="black" stroke-width="2.5" stroke-linecap="round"/>`
    },

    gas: {
        label: "Gas / Pressure",
        accent: "#2980b9",
        symbol: `
            <rect x="36" y="45" width="28" height="28" rx="5" fill="black"/>
            <path d="M36,50 C36,46 42,43 50,43 C58,43 64,46 64,50" fill="black"/>
            <rect x="43" y="32" width="14" height="9" rx="3" fill="black"/>
            <rect x="41" y="30" width="18" height="5" rx="2.5" fill="black"/>
            <rect x="58" y="49" width="3" height="18" rx="1.5" fill="white" opacity="0.25"/>`
    },

    pressure: {
        label: "Gas / Pressure",
        accent: "#2980b9",
        symbol: `
            <rect x="36" y="45" width="28" height="28" rx="5" fill="black"/>
            <path d="M36,50 C36,46 42,43 50,43 C58,43 64,46 64,50" fill="black"/>
            <rect x="43" y="32" width="14" height="9" rx="3" fill="black"/>
            <rect x="41" y="30" width="18" height="5" rx="2.5" fill="black"/>
            <rect x="58" y="49" width="3" height="18" rx="1.5" fill="white" opacity="0.25"/>`
    },

    corrosive: {
        label: "Corrosive",
        accent: "#8e44ad",
        symbol: `
            <path d="M30,22 L30,36 L46,36 L46,22" stroke="black" stroke-width="2.5"
                  fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="28" y1="22" x2="48" y2="22" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M54,22 L54,36 L70,36 L70,22" stroke="black" stroke-width="2.5"
                  fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="52" y1="22" x2="72" y2="22" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="38" cy="36" r="2.5" fill="black"/>
            <path d="M38,39 C36,45 32,48 32,54" stroke="black" stroke-width="2.2"
                  fill="none" stroke-linecap="round"/>
            <circle cx="62" cy="36" r="2.5" fill="black"/>
            <path d="M62,39 C64,45 68,48 68,54" stroke="black" stroke-width="2.2"
                  fill="none" stroke-linecap="round"/>
            <rect x="24" y="54" width="16" height="10" rx="2" fill="black"/>
            <rect x="60" y="54" width="16" height="10" rx="2" fill="black"/>
            <path d="M27,52 L28,50 L30,54" stroke="black" stroke-width="1.5"
                  fill="none" stroke-linecap="round"/>
            <path d="M63,52 L64,50 L66,54" stroke="black" stroke-width="1.5"
                  fill="none" stroke-linecap="round"/>`
    },

    health: {
        label: "Health hazard",
        accent: "#27ae60",
        symbol: `
            <circle cx="50" cy="24" r="8" fill="black"/>
            <path d="M50,32 L50,60" stroke="black" stroke-width="5" stroke-linecap="round" fill="none"/>
            <line x1="50" y1="40" x2="32" y2="52" stroke="black" stroke-width="4" stroke-linecap="round"/>
            <line x1="50" y1="40" x2="68" y2="52" stroke="black" stroke-width="4" stroke-linecap="round"/>
            <line x1="50" y1="60" x2="38" y2="75" stroke="black" stroke-width="4" stroke-linecap="round"/>
            <line x1="50" y1="60" x2="62" y2="75" stroke="black" stroke-width="4" stroke-linecap="round"/>
            <circle cx="42" cy="46" r="5" fill="black"/>
            <g stroke="white" stroke-width="1.8" stroke-linecap="round">
                <line x1="38" y1="42" x2="42" y2="46"/>
                <line x1="36" y1="46" x2="42" y2="46"/>
                <line x1="38" y1="50" x2="42" y2="46"/>
                <line x1="42" y1="41" x2="42" y2="46"/>
                <line x1="46" y1="43" x2="42" y2="46"/>
                <line x1="46" y1="49" x2="42" y2="46"/>
            </g>`
    },

    irritant: {
        label: "Irritant",
        accent: "#e67e22",
        symbol: `
            <rect x="44" y="24" width="12" height="36" rx="6" fill="black"/>
            <circle cx="50" cy="72" r="7" fill="black"/>`
    },

    environment: {
        label: "Environmental",
        accent: "#2980b9",
        symbol: `
            <line x1="44" y1="70" x2="44" y2="40" stroke="black" stroke-width="4" stroke-linecap="round"/>
            <line x1="44" y1="47" x2="33" y2="35" stroke="black" stroke-width="3" stroke-linecap="round"/>
            <line x1="44" y1="41" x2="58" y2="31" stroke="black" stroke-width="3" stroke-linecap="round"/>
            <line x1="44" y1="54" x2="31" y2="49" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="44" y1="51" x2="57" y2="43" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M22,70 Q28,66 34,70 Q40,74 46,70 Q52,66 58,70 Q64,74 70,70 Q76,66 78,70 L78,80 L22,80 Z"
                  fill="black"/>
            <path d="M60,74 C64,70 71,71 73,74 C71,77 64,78 60,74 Z" fill="white"/>
            <line x1="73" y1="74" x2="77" y2="71" stroke="white" stroke-width="1.5"/>
            <line x1="73" y1="74" x2="77" y2="77" stroke="white" stroke-width="1.5"/>
            <circle cx="63" cy="74" r="1.2" fill="black"/>`
    },

    toxic: {
        label: "Acute toxic",
        accent: "#c0392b",
        symbol: `
            <path d="M50,20 C36,20 26,30 26,43 C26,51 30,58 37,62 L37,72 L63,72 L63,62
                     C70,58 74,51 74,43 C74,30 64,20 50,20 Z" fill="black"/>
            <ellipse cx="41" cy="43" rx="6" ry="7" fill="white"/>
            <ellipse cx="59" cy="43" rx="6" ry="7" fill="white"/>
            <path d="M47,55 L53,55 L50,59 Z" fill="white"/>
            <rect x="37" y="65" width="8" height="8" rx="1" fill="white"/>
            <rect x="46" y="65" width="8" height="8" rx="1" fill="white"/>
            <rect x="55" y="65" width="8" height="8" rx="1" fill="white"/>`
    }
};

// ─── BUILD A SINGLE GHS SVG ──────────────────────────────────────────────────
function buildGHS(key) {
    const p = GHS[key];
    if (!p) return "";
    return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,3 97,50 50,97 3,50" fill="white" stroke="#e8001c" stroke-width="6"/>
        <polygon points="50,10 90,50 50,90 10,50" fill="white" stroke="none"/>
        ${p.symbol}
    </svg>`;
}

// ─── ACCENT COLOR FROM HAZARD STRING ────────────────────────────────────────
function getAccent(h) {
    h = h.toLowerCase();
    if (h.includes("explosive"))   return GHS.explosive.accent;
    if (h.includes("flammable"))   return GHS.flammable.accent;
    if (h.includes("oxidiz"))      return GHS.oxidizer.accent;
    if (h.includes("corrosive"))   return GHS.corrosive.accent;
    if (h.includes("toxic"))       return GHS.toxic.accent;
    if (h.includes("health"))      return GHS.health.accent;
    if (h.includes("irritant"))    return GHS.irritant.accent;
    if (h.includes("environment")) return GHS.environment.accent;
    if (h.includes("gas") || h.includes("pressure")) return GHS.gas.accent;
    return "#2a5298";
}

// ─── BUILD LEGEND ─────────────────────────────────────────────────────────────
function buildLegend() {
    const items = [
        "flammable","explosive","oxidizer","gas",
        "corrosive","toxic","irritant","health","environment"
    ];
    const leg = document.getElementById("legend");
    items.forEach(key => {
        const div = document.createElement("div");
        div.className = "legend-item";
        div.innerHTML = buildGHS(key) + `<span>${GHS[key].label}</span>`;
        leg.appendChild(div);
    });
}

// ─── DOC ICON ─────────────────────────────────────────────────────────────────
const docSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
</svg>`;

// ─── LOAD CSV ─────────────────────────────────────────────────────────────────
fetch(sheetURL)
.then(res => res.text())
.then(csv => {

    const rows = csv.split("\n");

    for (let i = 1; i < rows.length; i++) {
        const row = rows[i].trim();
        if (!row) continue;

        const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        if (!cols || cols.length < 2) continue;

        let name    = cols[0].replace(/"/g, "").trim();
        let url     = cols[1].replace(/"/g, "").trim();
        let hazards = cols[2] ? cols[2].replace(/"/g, "").trim() : "";

        if (url.includes("drive.google.com")) {
            url = url.replace("/view", "/preview");
        }

        dataList.push({ name, url, hazards, row: i });
    }

    buildLegend();

    // QR MODE — show only one card
    if (id) {
        const item = dataList.find(x => x.row == id);
        if (item) display([item]);
    } else {
        display(dataList);
    }
});

// ─── DISPLAY ──────────────────────────────────────────────────────────────────
function display(list) {
    const container = document.getElementById("list");
    container.innerHTML = "";

    list.forEach(item => {

        // Build GHS icon row from hazard CSV string
        let iconHTML = "";
        item.hazards.toLowerCase().split(",").forEach(h => {
            const text = h.trim();
            Object.keys(GHS).forEach(key => {
                if (text.includes(key)) iconHTML += buildGHS(key);
            });
        });

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-accent" style="background:${getAccent(item.hazards)}"></div>
            <div class="card-body">
                <div class="card-name">${item.name}</div>
                <div class="card-icons">${iconHTML}</div>
                <button class="card-btn">${docSVG} View MSDS</button>
            </div>`;

        card.querySelector(".card-btn").onclick = () => {
            if (item.url) window.open(item.url, "_blank");
            else alert("MSDS not available");
        };

        container.appendChild(card);
    });
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function filterData() {
    const txt = document.getElementById("search").value.toLowerCase();
    display(dataList.filter(item => item.name.toLowerCase().includes(txt)));
}

</script>
</body>
</html>
